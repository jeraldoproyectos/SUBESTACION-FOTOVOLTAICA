<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8"/>
    <title>My Map Set Name (Google Maps Export from Global Mapper)</title>
    <script type="text/javascript" src="http://maps.google.com/maps/api/js?sensor=false"></script>
    <script type="text/javascript">

    var G = google.maps;
    var map;
    
    var customMapType = new G.ImageMapType
      (
        {
        getTileUrl: function(coord, zoom)
          {
          var normalizedCoord = getNormalizedCoord(coord, zoom);
          if (!normalizedCoord) { return null; }
          
          if ( zoom == 6 && normalizedCoord.x >= 19 && normalizedCoord.x <= 32 && normalizedCoord.y >= 32 && normalizedCoord.y <= 35 )
          {
            return "file:///D://LINEA%20DE%20TIEMPO%20ATACAMA//SUBESTACION-FOTOVOLTAICA//FUNDACIONES//Z" + zoom + "/" + normalizedCoord.y + "/" + normalizedCoord.x + ".png"; // replace that with a "real" URL
          }
          else if ( zoom == 7 && normalizedCoord.x >= 39 && normalizedCoord.x <= 64 && normalizedCoord.y >= 64 && normalizedCoord.y <= 71 )
          {
            return "file:///D://LINEA%20DE%20TIEMPO%20ATACAMA//SUBESTACION-FOTOVOLTAICA//FUNDACIONES//Z" + zoom + "/" + normalizedCoord.y + "/" + normalizedCoord.x + ".png"; // replace that with a "real" URL
          }
          else if ( zoom == 8 && normalizedCoord.x >= 78 && normalizedCoord.x <= 128 && normalizedCoord.y >= 128 && normalizedCoord.y <= 142 )
          {
            return "file:///D://LINEA%20DE%20TIEMPO%20ATACAMA//SUBESTACION-FOTOVOLTAICA//FUNDACIONES//Z" + zoom + "/" + normalizedCoord.y + "/" + normalizedCoord.x + ".png"; // replace that with a "real" URL
          }
          else if ( zoom == 9 && normalizedCoord.x >= 156 && normalizedCoord.x <= 256 && normalizedCoord.y >= 256 && normalizedCoord.y <= 285 )
          {
            return "file:///D://LINEA%20DE%20TIEMPO%20ATACAMA//SUBESTACION-FOTOVOLTAICA//FUNDACIONES//Z" + zoom + "/" + normalizedCoord.y + "/" + normalizedCoord.x + ".png"; // replace that with a "real" URL
          }
          else if ( zoom == 10 && normalizedCoord.x >= 313 && normalizedCoord.x <= 512 && normalizedCoord.y >= 512 && normalizedCoord.y <= 571 )
          {
            return "file:///D://LINEA%20DE%20TIEMPO%20ATACAMA//SUBESTACION-FOTOVOLTAICA//FUNDACIONES//Z" + zoom + "/" + normalizedCoord.y + "/" + normalizedCoord.x + ".png"; // replace that with a "real" URL
          }
          return null;
        },

        alt: "My Map Set Name",
        tileSize: new G.Size(256, 256),
        isPng: true,
        maxZoom: 10,
        minZoom: 6,
        opacity: 1.00,
        name: "My Map Set Name"
      }
    )

    function getNormalizedCoord(coord, zoom)
    {
      var y = coord.y;
      var x = coord.x;
      
      var tileRange = 1 << zoom;
      
      if (y < 0 || y >= tileRange) { return null; }
      if (x < 0 || x >= tileRange)
      {
        x = (x % tileRange + tileRange) % tileRange;
      }
      
      return { x: x, y: y };
    }

    function initialize()
    {
      var myLatlng = new G.LatLng(-10.971523,-36.562500);
      var myOptions = {
        center: myLatlng,
        zoom: 6,
        mapTypeId: G.MapTypeId.ROADMAP,
        mapTypeControl: true,
        overviewMapControl: false,
        scaleControl: false,
        streetViewControl: true,
        panControl: true,
        zoomControl: true,
        zoomControlOptions: { style: google.maps.ZoomControlStyle.DEFAULT }
      };
      
      map = new G.Map(document.getElementById("map_canvas"), myOptions);
      map.overlayMapTypes.insertAt(0, customMapType);
    }
    </script>
</head>
<body onload="initialize()">
<div id="map_canvas" style="width: 100%; height: 800px; margin: 0px 0px 0px 0px; float: middle;"></div>
</body> </html>
